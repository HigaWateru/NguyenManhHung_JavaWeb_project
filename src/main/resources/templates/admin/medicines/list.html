<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý thuốc')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="main-content container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0">
                <div th:replace="~{fragments/layout :: sidebar('medicines')}"></div>
            </div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2 fw-bold">Danh mục Thuốc</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/admin/medicines/add}" class="btn btn-primary">
                            <i class="fas fa-plus me-1"></i> Thêm thuốc mới
                        </a>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Tên thuốc</th>
                                        <th>Đơn vị</th>
                                        <th>Giá (VNĐ)</th>
                                        <th>Tồn kho</th>
                                        <th class="text-end pe-4">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="m : ${medicines}">
                                        <td class="ps-4 fw-bold" th:text="${m.name}">Paracetamol</td>
                                        <td th:text="${m.unit}">Viên</td>
                                        <td th:text="${#numbers.formatDecimal(m.price, 0, 'COMMA', 0, 'POINT')}">1,000</td>
                                        <td>
                                            <span th:text="${m.stock}" th:class="${m.stock < 50 ? 'text-danger fw-bold' : ''}">100</span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <a th:href="@{/admin/medicines/edit/{id}(id=${m.id})}" class="btn btn-sm btn-outline-primary me-1">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <button type="button"
                                                    class="btn btn-sm btn-outline-danger"
                                                    data-bs-toggle="modal"
                                                    data-bs-target="#deleteMedicineModal"
                                                    th:data-delete-url="@{/admin/medicines/delete/{id}(id=${m.id})}"
                                                    th:data-medicine-name="${m.name}">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(medicines)}">
                                        <td colspan="5" class="text-center py-5 text-muted">Chưa có dữ liệu thuốc nào.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="deleteMedicineModal" tabindex="-1" aria-labelledby="deleteMedicineModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="deleteMedicineForm" method="get">
                    <div class="modal-header">
                        <h5 class="modal-title" id="deleteMedicineModalLabel">Xác nhận xoá thuốc</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        Bạn có chắc chắn muốn xoá thuốc <strong id="deleteMedicineName"></strong> không?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-danger">Xác nhận xoá</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script>
        const deleteMedicineModal = document.getElementById('deleteMedicineModal');
        deleteMedicineModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const deleteUrl = button.getAttribute('data-delete-url');
            const medicineName = button.getAttribute('data-medicine-name');

            document.getElementById('deleteMedicineForm').setAttribute('action', deleteUrl);
            document.getElementById('deleteMedicineName').textContent = medicineName;
        });
    </script>
</body>
</html>
