<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Duyet don thuoc')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="main-content container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0">
                <div th:replace="~{fragments/layout :: sidebar('prescriptions')}"></div>
            </div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <div>
                        <h1 class="h2 fw-bold mb-1">Duyệt đơn thuốc</h1>
                        <p class="text-muted mb-0">Kiểm tra và cập trạng thái đơn thuốc sau khi bác sĩ kê đơn.</p>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Mã đơn</th>
                                        <th>Bệnh nhân</th>
                                        <th>Bác sĩ</th>
                                        <th>Ngày khám</th>
                                        <th>Trạng thái</th>
                                        <th class="text-end pe-4">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="prescription : ${prescriptions}">
                                        <td class="ps-4 fw-bold" th:text="${'#DT-' + prescription.id}">#DT-1</td>
                                        <td th:text="${prescription.medicalRecord.appointment.patient.profile != null ? prescription.medicalRecord.appointment.patient.profile.fullName : prescription.medicalRecord.appointment.patient.username}">Benh nhan</td>
                                        <td th:text="${prescription.medicalRecord.appointment.doctor.user.profile != null ? prescription.medicalRecord.appointment.doctor.user.profile.fullName : prescription.medicalRecord.appointment.doctor.user.username}">Bac si</td>
                                        <td th:text="${prescription.medicalRecord.appointment.appointmentDate}">2026-05-07</td>
                                        <td>
                                            <span class="badge"
                                                  th:classappend="${prescription.status == T(demo.project.model._enum.Status).PENDING ? 'bg-warning text-dark' : (prescription.status == T(demo.project.model._enum.Status).CONFIRMED ? 'bg-success' : 'bg-secondary')}"
                                                  th:text="${prescription.status}">PENDING</span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <form th:if="${prescription.status == T(demo.project.model._enum.Status).PENDING}" th:action="@{/admin/prescriptions/{id}/approve(id=${prescription.id})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-success me-1">
                                                    <i class="fas fa-check me-1"></i> Duyệt
                                                </button>
                                            </form>
                                            <form th:if="${prescription.status == T(demo.project.model._enum.Status).PENDING}" th:action="@{/admin/prescriptions/{id}/reject(id=${prescription.id})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                                    <i class="fas fa-times me-1"></i> Từ chối
                                                </button>
                                            </form>
                                            <span th:unless="${prescription.status == T(demo.project.model._enum.Status).PENDING}" class="text-success small"><i class="fas fa-check-circle"></i> Đã duyệt</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(prescriptions)}">
                                        <td colspan="6" class="text-center py-5 text-muted">Chưa có đơn thuốc nào.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
