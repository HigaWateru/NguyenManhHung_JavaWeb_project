<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Bác sĩ Dashboard')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="main-content container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0">
                <div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>
            </div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2 fw-bold">Danh sách bệnh nhân chờ khám</h1>
                    <div class="text-muted">Hôm nay: <span class="fw-bold" th:text="${#calendars.format(#calendars.createNow(), 'dd/MM/yyyy')}"></span></div>
                </div>

                <!-- Stats Summary -->
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="card border-start border-primary border-4 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted small text-uppercase">Chờ khám</h6>
                                        <h3 class="fw-bold mb-0 text-primary" th:text="${#numbers.formatInteger(pendingCount, 2)}">05</h3>
                                    </div>
                                    <div class="bg-primary bg-opacity-10 p-3 rounded-circle">
                                        <i class="fas fa-user-clock text-primary fa-lg"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-start border-success border-4 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted small text-uppercase">Đã khám xong</h6>
                                        <h3 class="fw-bold mb-0 text-success" th:text="${#numbers.formatInteger(completedCount, 2)}">12</h3>
                                    </div>
                                    <div class="bg-success bg-opacity-10 p-3 rounded-circle">
                                        <i class="fas fa-user-check text-success fa-lg"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-start border-info border-4 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted small text-uppercase">Tổng ca khám</h6>
                                        <h3 class="fw-bold mb-0 text-info" th:text="${#numbers.formatInteger(totalCount, 2)}">17</h3>
                                    </div>
                                    <div class="bg-info bg-opacity-10 p-3 rounded-circle">
                                        <i class="fas fa-users text-info fa-lg"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Appointment List -->
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">STT</th>
                                        <th>Bệnh nhân</th>
                                        <th>Thời gian</th>
                                        <th>Lý do khám</th>
                                        <th>Trạng thái</th>
                                        <th class="text-end pe-4">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="appointment, iter : ${appointments}">
                                        <td class="ps-4" th:text="${iter.count}">1</td>
                                        <td>
                                            <div class="fw-bold" th:text="${appointment.patient.profile != null and appointment.patient.profile.fullName != null and appointment.patient.profile.fullName != '' ? appointment.patient.profile.fullName : appointment.patient.username}">Lê Văn C</div>
                                            <small class="text-muted" th:text="${appointment.patient.profile != null ? appointment.patient.profile.phone : ''}">SĐT</small>
                                        </td>
                                        <td>
                                            <span th:text="${appointment.appointmentTime}">08:30</span> - 
                                            <span th:text="${appointment.appointmentDate}">01/01/2026</span>
                                        </td>
                                        <td>Lịch khám sức khỏe</td>
                                        <td>
                                            <span class="badge" th:classappend="${appointment.status == T(demo.project.model._enum.Status).PENDING ? 'bg-primary' : (appointment.status == T(demo.project.model._enum.Status).COMPLETED ? 'bg-success' : 'bg-secondary')}" 
                                                  th:text="${appointment.status}">PENDING</span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <a th:if="${appointment.status == T(demo.project.model._enum.Status).PENDING}" 
                                               th:href="@{/doctor/examine/{id}(id=${appointment.id})}" 
                                               class="btn btn-sm btn-success px-3">Bắt đầu khám <i class="fas fa-arrow-right ms-1"></i></a>
                                            <span th:if="${appointment.status == T(demo.project.model._enum.Status).COMPLETED}" class="text-success small"><i class="fas fa-check-circle"></i> Đã xong</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(appointments)}">
                                        <td colspan="6" class="text-center py-4 text-muted small">
                                            Không có lịch khám nào cho bạn.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
