<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Lich su kham')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="main-content container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0">
                <div th:replace="~{fragments/layout :: sidebar('history')}"></div>
            </div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <div>
                        <h1 class="h2 fw-bold mb-1">Lịch sử khám</h1>
                        <p class="text-muted mb-0">Các ca khám đã hoàn thành.</p>
                    </div>
                    <a th:href="@{/doctor/dashboard}" class="btn btn-outline-primary">
                        <i class="fas fa-clipboard-list me-1"></i> Lịch chờ khám
                    </a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Bệnh nhân</th>
                                        <th>Ngày khám</th>
                                        <th>Thông tin liên hệ</th>
                                        <th>Trạng thái</th>
                                        <th class="text-end pe-4">Hồ sơ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="appointment : ${appointments}">
                                        <td class="ps-4">
                                            <div class="fw-bold" th:text="${appointment.patient.profile != null and appointment.patient.profile.fullName != null and appointment.patient.profile.fullName != '' ? appointment.patient.profile.fullName : appointment.patient.username}">Benh nhan</div>
                                            <small class="text-muted" th:text="${'Mã lịch #' + appointment.id}">Mã lịch #1</small>
                                        </td>
                                        <td>
                                            <div th:text="${appointment.appointmentDate}">2026-05-07</div>
                                            <small class="text-muted" th:text="${appointment.appointmentTime}">08:00</small>
                                        </td>
                                        <td th:text="${appointment.patient.profile != null ? appointment.patient.profile.phone : 'Chưa cập nhật'}">Số điện thoại</td>
                                        <td><span class="badge bg-success">COMPLETED</span></td>
                                        <td class="text-end pe-4">
                                            <span class="text-muted small">Đã lưu kết quả</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(appointments)}">
                                        <td colspan="5" class="text-center py-5 text-muted">Chưa có lịch khám nào.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
