<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Smart Healthcare'"></title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content {
            flex: 1;
        }
        .navbar-brand {
            font-weight: 700;
            color: #0d6efd;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-primary {
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 500;
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: white;
            border-right: 1px solid #dee2e6;
        }
        .nav-link {
            color: #495057;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 12px;
        }
        .nav-link:hover, .nav-link.active {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white sticky-top border-bottom">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="">
            <i class="fas fa-heartbeat"></i> SmartHealth
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="">Trang chủ</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <span class="navbar-text me-3">
                        <i class="fas fa-user-circle me-1"></i>
                        Xin chào, <strong th:text="${session.loginUser.username}">User</strong> 
                        (<span class="badge bg-info text-dark" th:text="${session.loginUser.role}">Role</span>)
                    </span>
                </li>
                <li class="nav-item" th:if="${session.loginUser == null}">
                    <a class="btn btn-outline-primary me-2" th:href="@{/login}">Đăng nhập</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser == null}">
                    <a class="btn btn-primary" th:href="@{/register}">Đăng ký</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link border-0 d-inline" style="background:none;">
                            <i class="fas fa-sign-out-alt"></i> Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="sidebar(activeLink)" class="sidebar d-none d-md-block">
    <div class="py-4">
        <!-- Admin Menu -->
        <div th:if="${session.loginUser != null and session.loginUser.role.name() == 'ADMIN'}">
            <h6 class="px-4 text-uppercase fw-bold small text-muted mb-3">Quản trị viên</h6>
            <a th:href="@{/admin/dashboard}" class="nav-link" th:classappend="${activeLink == 'dashboard' ? 'active' : ''}">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
            <a href="#" class="nav-link" th:classappend="${activeLink == 'medicines' ? 'active' : ''}">
                <i class="fas fa-pills"></i> Quản lý thuốc
            </a>
            <a href="#" class="nav-link" th:classappend="${activeLink == 'specialties' ? 'active' : ''}">
                <i class="fas fa-stethoscope"></i> Chuyên khoa
            </a>
            <a href="#" class="nav-link" th:classappend="${activeLink == 'prescriptions' ? 'active' : ''}">
                <i class="fas fa-file-invoice-dollar"></i> Duyệt đơn thuốc
            </a>
            <a href="#" class="nav-link" th:classappend="${activeLink == 'prescriptions' ? 'active' : ''}">
                <i class="fas fa-file-invoice-dollar"></i> Thêm bác sĩ
            </a>
        </div>

        <!-- Doctor Menu -->
        <div th:if="${session.loginUser != null and session.loginUser.role.name() == 'DOCTOR'}">
            <h6 class="px-4 text-uppercase fw-bold small text-muted mb-3">Bác sĩ</h6>
            <a th:href="@{/doctor/dashboard}" class="nav-link" th:classappend="${activeLink == 'dashboard' ? 'active' : ''}">
                <i class="fas fa-clipboard-list"></i> Lịch chờ khám
            </a>
            <a href="#" class="nav-link" th:classappend="${activeLink == 'history' ? 'active' : ''}">
                <i class="fas fa-history"></i> Lịch sử khám
            </a>
        </div>

        <!-- Common Menu -->
        <h6 class="px-4 text-uppercase fw-bold small text-muted mb-3 mt-4">Cá nhân</h6>
        <a th:href="@{/profile}" class="nav-link" th:classappend="${activeLink == 'profile' ? 'active' : ''}">
            <i class="fas fa-user-edit"></i> Hồ sơ của tôi
        </a>
    </div>
</div>

<footer th:fragment="footer" class="py-4 bg-white border-top mt-5 fixed-bottom">
    <div class="container text-center text-muted">
        <small>&copy; 2026 Smart Healthcare Platform. All rights reserved.</small>
    </div>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
