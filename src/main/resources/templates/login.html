<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng nhập')}"></head>
<body class="bg-light">
    <div class="main-content container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <h2 class="text-primary fw-bold"><i class="fas fa-heartbeat"></i> SmartHealth</h2>
                    <p class="text-muted">Chào mừng bạn trở lại</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/login}" method="post" th:object="${loginForm}">
                            <h4 class="mb-4 fw-bold">Đăng nhập</h4>
                            
                            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                Tên đăng nhập hoặc mật khẩu không chính xác.
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>

                            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                                Bạn đã đăng xuất thành công.
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>

                            <div class="mb-3">
                                <label for="username" class="form-label">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Nhập tên đăng nhập">
                                </div>
                                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small mt-1"></p>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Nhập mật khẩu">
                                </div>
                                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small mt-1"></p>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3 shadow-sm">Đăng nhập</button>
                            
                            <div class="text-center">
                                <span class="text-muted small">Chưa có tài khoản?</span>
                                <a th:href="@{/register}" class="small fw-bold text-decoration-none">Đăng ký ngay</a>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="/home" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
