<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng ký tài khoản')}"></head>
<body class="bg-light">
    <div class="main-content container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <h2 class="text-primary fw-bold"><i class="fas fa-heartbeat"></i> SmartHealth</h2>
                    <p class="text-muted">Tham gia mạng lưới y tế thông minh</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/register}" th:object="${registerForm}" method="post">
                            <h4 class="mb-4 fw-bold">Đăng ký</h4>
                            
                            <div class="mb-3">
                                <label for="username" class="form-label">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Chọn tên đăng nhập">
                                </div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Nhập mật khẩu">
                                </div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-check-double text-muted"></i></span>
                                    <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu">
                                </div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3 shadow-sm">Tạo tài khoản</button>
                            
                            <div class="text-center">
                                <span class="text-muted small">Đã có tài khoản?</span>
                                <a th:href="@{/login}" class="small fw-bold text-decoration-none">Đăng nhập ngay</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
